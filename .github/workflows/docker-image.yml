name: Build and Push Docker image

on:
  push:
    branches:
      - main
    tags:
      - '*'
    # 优化: 忽略与构建无关的文件修改，节省 GitHub Actions 时长额度
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker image tag
        id: image_tag
        run: |
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
              echo "tag=latest" >> $GITHUB_ENV
          elif [ "${GITHUB_EVENT_NAME}" == "pull_request" ]; then
              echo "tag=pr-${{ github.event.number }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
              echo "tag=unknown" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # PR 时仅构建不推送，Push 时构建并推送
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/scipopt-docker:${{ env.tag }}
          # 开启 GitHub Actions 的构建缓存，第二次构建速度将产生质的飞跃
          cache-from: type=gha
          cache-to: type=gha,mode=max